<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EasyLink Status Checker</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

    <div class="card">

        <h2>EASYLINK STATUS CHECKER_</h2>
        <p class="subtitle">Check transaction status by External ID / Vendor ID</p>

        <div class="form-group">
            <label>Device</label>

            <select id="deviceSelect">
                <option value="364ac596-2b99-487e-975c-e30fc3975c50">DMI</option>
                <option value="f0794335-65ab-41f1-bfff-b40fcb4dcf5a">KMI</option>
                <option value="e5836c3e-7e50-45e9-9c50-f0a9a46d268d">KALABIRU</option>
            </select>
        </div>

        <div class="form-group">
            <label>External ID / Vendor ID</label>

            <textarea
                id="ids"
                rows="10"
                placeholder="Paste Vendor ID atau External ID...."
            ></textarea>
        </div>

        <button id="checkBtn">
            🔍 Check Status
        </button>

    </div>

        <div class="card">

            <table id="resultTable">

                <thead>

                    <tr>

                        <th>No</th>

                        <th>External id</th>

                        <th>Vendor Id</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
